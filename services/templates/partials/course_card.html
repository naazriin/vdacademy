
{% load service_filters %}

{% for course in page_obj %}
    <div class="col-12 col-xl-4 col-lg-6 col-md-6">
        <div class="edu-course course-style-5">
            <div class="inner">
                <div class="thumbnail">
                    <a href="{% url 'course-detail' course.id %}">
                        <img src="{{ course.image.url }}" alt="{{ course.title }}">
                    </a>
                </div>
                <div class="content">
                    <div class="course-price price-round">${{ course.price }}</div>
                    <span class="course-level">{{ course.level }}</span>
                    <h5 class="title">
                        <a href="{% url 'course-detail' course.id %}">{{ course.title }}</a>
                    </h5>
                    <p>{{ course.description|truncatechars:100 }}</p>
                </div>
            </div>
        </div>
    </div>
{% endfor %}
