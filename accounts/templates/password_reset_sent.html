{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="d-flex align-items-center justify-content-center" style="min-height: 85vh; background-color: #a9ebcc;">
    <div class="form-card w-100 text-center" style="max-width: 400px;">
      <h4>Password Reset Email Sent</h4>
      <p class="mt-3">If an account with that email exists, you will receive a password reset link shortly.</p>
      <a class="btn mt-3" style="background: linear-gradient(90deg, #31b978 0%, #1ab69d 100%); color: white; border: none;" href="{% url 'login' %}">Back to Login</a>
    </div>
  </section>  

  
{% endblock %}
