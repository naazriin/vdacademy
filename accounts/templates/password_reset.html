{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="d-flex align-items-center justify-content-center" style="min-height: 85vh; background-color: #a9ebcc;">
    <div class="form-card w-100" style="max-width: 400px;">
      <h3 class="text-center mb-4">Reset Your Password</h3>
  
      <form method="POST" novalidate>
        {% csrf_token %}
        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
          {% endfor %}
        {% endif %}
  
        <div class="mb-3">
          {{ form.email.label_tag }}
          {{ form.email }}
          {{ form.email.errors }}
        </div>
  
        <button type="submit" class="btn w-100" style="background: linear-gradient(90deg, #31b978 0%, #1ab69d 100%); color: white; border: none;">Send Reset Link</button>
  
        <div class="text-center mt-3">
          <a href="{% url 'login' %}">Back to Login</a>
        </div>
      </form>
    </div>
  </section>
  
{% endblock %}
